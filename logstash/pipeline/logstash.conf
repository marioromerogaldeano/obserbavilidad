input {
  file {
    path => "/var/log/api/app.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
  }
}

filter {
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "api-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}